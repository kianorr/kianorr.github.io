          - link: "js/gallery-slider.js"
          - link: "plugins/swiper/swiper-bundle.js"

      
      assets:
        favicon: "/jupiter.png"

      socialIcons:
              - name: github
                url: "https://github.com/kianorr"
      homeInfoParams:
          Title: "hello  (•◡•) /"
          Content: "my name is kian johan nils orr and this is my website! :) It features different areas of my life, like [physics research](/research), [books](/books), and [graphic design](/graphic-design). 
          I am currently in grad school, where I am beginning to do research in HED plasma physics. Below are some recent things I've done."
